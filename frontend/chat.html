<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsflow AI</title>
    <!-- Elegant, clean geometric sans-serif font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --surface-color: #f9fafb;
            --border-color: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent-color: #2563eb;
            --user-bubble: #f3f4f6;
            --font-main: 'Outfit', sans-serif;
            --max-w: 800px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            /* Placeholder styling if image fails */
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        /* Chat Area */
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-container {
            width: 100%;
            max-width: var(--max-w);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding-bottom: 2rem;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 1.25rem;
            max-width: 100%;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .avatar.ai {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
        }

        .avatar.user {
            background-color: var(--text-main);
            color: white;
        }

        .message-content {
            flex-grow: 1;
            padding-top: 0.25rem;
        }

        /* The user's message gets a soft gray background */
        .message.user .message-content {
            background-color: var(--user-bubble);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border-top-right-radius: 4px; /* classic chat bubble tail */
            align-self: flex-start;
            max-width: 85%;
        }
        
        /* Justification logic for user */
        .message.user {
            flex-direction: row-reverse;
            align-self: flex-end;
        }
        .message.user .avatar {
            display: none; /* Hide user avatar for cleaner look, optional */
        }

        .message.ai .message-content {
            font-size: 1.05rem;
            color: #374151;
        }

        .message.ai h3 {
            margin: 1.5rem 0 0.75rem 0;
            font-weight: 600;
            color: var(--text-main);
        }

        .message.ai p {
            margin-bottom: 1rem;
        }

        /* Status Indicator inside AI response */
        .ai-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--surface-color);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Input Area fixed at bottom */
        .input-area {
            background-color: var(--bg-color);
            padding: 1.5rem 2rem 2.5rem 2rem;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: var(--max-w);
            position: relative;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0.5rem 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .query-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            padding: 0.75rem 3rem 0.75rem 0.5rem;
            outline: none;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            line-height: 1.5;
            overflow-y: hidden;
        }

        .send-button {
            position: absolute;
            right: 0.75rem;
            bottom: 0.75rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-main);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .send-button:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        .send-button:hover:not(:disabled) {
            background-color: var(--accent-color);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Placeholder state */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
            opacity: 1;
            transition: opacity 0.3s;
        }

        .welcome-screen h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Real logo will go here, using a stylized CSS placeholder for now -->
            <div class="logo-icon">N</div>
            <span class="logo-text">Newsflow AI</span>
        </div>
    </header>

    <main id="chat-window">
        <div class="chat-container">
            
            <!-- Welcome Screen shown before chatting -->
            <div class="welcome-screen" id="welcome-screen">
                <h2>What do you want to research today?</h2>
                <p>Enter a technical query or news topic to begin deep parallel extraction.</p>
            </div>

            <!-- Messages will be injected here by JS -->

        </div>
    </main>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea 
                id="query-input" 
                class="query-input" 
                rows="1" 
                placeholder="Ask Newsflow AI..."
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button id="send-button" class="send-button" onclick="sendMessage()">
                <!-- SVG Send Icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-button');
        const chatContainer = document.querySelector('.chat-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatWindow = document.getElementById('chat-window');

        // Auto-resize textarea
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            let newHeight = this.scrollHeight;
            if (newHeight > 200) newHeight = 200; // max height
            this.style.height = newHeight + 'px';
            
            // Enable/disable button based on input
            if (this.value.trim() === '') {
                sendBtn.disabled = true;
            } else {
                sendBtn.disabled = false;
            }
        });

        // Initialize button state
        sendBtn.disabled = true;

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) {
                    sendMessage();
                }
            }
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // Hide welcome screen on first message
            if (welcomeScreen.style.display !== 'none') {
                welcomeScreen.style.display = 'none';
            }

            // 1. Add User Message
            const userMsgHTML = `
                <div class="message user">
                    <div class="message-content">
                        ${text}
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', userMsgHTML);

            // Clean input
            inputField.value = '';
            inputField.style.height = 'auto';
            sendBtn.disabled = true;
            scrollToBottom();

            // 2. Add AI Placeholder with Status Indicator
            const aiId = "ai-msg-" + Date.now();
            const aiMsgHTML = `
                <div class="message ai" id="${aiId}">
                    <div class="avatar ai">N</div>
                    <div class="message-content">
                        <div class="ai-status" id="${aiId}-status">
                            <div class="spinner"></div>
                            <span class="status-text">Generating research plan...</span>
                        </div>
                        <div class="ai-text" id="${aiId}-text"></div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', aiMsgHTML);
            scrollToBottom();

            // 3. Mock Streaming Sequence
            startMockStream(aiId);
        }

        function startMockStream(targetId) {
            const statusBox = document.getElementById(`${targetId}-status`);
            const statusText = statusBox.querySelector('.status-text');
            const textBox = document.getElementById(`${targetId}-text`);

            // Sequence of statuses
            const statuses = [
                { time: 1000, text: "Extracting parallel knowledge chunks..." },
                { time: 3000, text: "Mistral is grading specific relevance..." },
                { time: 5000, text: "Connecting to output synthesiser..." },
            ];

            statuses.forEach(s => {
                setTimeout(() => {
                    if(statusBox.style.display !== 'none') {
                        statusText.innerText = s.text;
                    }
                }, s.time);
            });

            // Stream Final Output
            setTimeout(() => {
                // Hide the explicit status box because streaming begins
                statusBox.style.display = 'none';
                
                const finalMarkdown = [
                    "<h3>Research Synthesis</h3>",
                    "<p>Based on the extracted data, the current architecture utilizing LangGraph achieves highly optimized latency thresholds.</p>",
                    "<p>Specifically, the <strong>parallel semaphore pattern</strong> drastically improved Mistral's inference queuing.</p>",
                    "<p>Let me know if you would like me to summarize further.</p>"
                ].join("");

                // Simulated typewriting effect for the HTML
                let i = 0;
                let buffer = "";
                // To avoid breaking HTML tags while typing, we just drop the chunks entirely here 
                // but in a real app, SSE streams tokens!
                
                textBox.innerHTML = finalMarkdown;
                textBox.style.opacity = 0;
                textBox.style.animation = "fadeIn 0.5s ease-out forwards";
                scrollToBottom();

            }, 6000);
        }
    </script>

</body>
</html>
